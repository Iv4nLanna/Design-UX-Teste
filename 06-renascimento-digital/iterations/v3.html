<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCUNABULA — v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;background:#0c0a08;color:#e8dfcf;font-family:'EB Garamond',Georgia,serif;overflow:hidden}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0c0a08;overflow:auto}
  #overture{position:fixed;inset:0;z-index:50;background:#0c0a08;color:#e8dfcf;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;transition:opacity 2s}
  #overture.gone{opacity:0;pointer-events:none}
  #overture h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:2rem;font-style:italic;font-weight:300;margin-bottom:2rem;max-width:30em;line-height:1.5;text-align:center}
  #enter{padding:.8rem 1.6rem;border:1px solid #9a8e72;background:transparent;color:#d6c89a;cursor:pointer;font-family:monospace;font-size:.6rem;letter-spacing:.55em;text-transform:uppercase;margin-top:3rem}
  #enter:hover{background:#e8dfcf;color:#0c0a08}
  #gallery{display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:2rem;padding:3rem;max-width:1400px;margin:0 auto}
  .work{border:2px solid #6a5a3c;overflow:hidden;background:#1a1612;cursor:pointer;transition:transform .3s,box-shadow .3s}
  .work:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(214,200,154,.3)}
  .work img{display:block;width:100%;height:auto;min-height:200px;object-fit:cover;background:#0c0a08}
  .work-meta{padding:1.2rem;font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.35em;text-transform:uppercase;color:#d6c89a;border-top:1px solid #6a5a3c}
  .work-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.1rem;font-style:italic;font-weight:400;color:#e8dfcf;margin-bottom:.5rem}
  #modal{position:fixed;inset:0;background:rgba(12,10,8,.95);z-index:100;display:none;align-items:center;justify-content:center;padding:2rem}
  #modal.show{display:flex}
  #modal img{max-width:80vh;max-height:80vh;object-fit:contain}
  #closeModal{position:fixed;top:2rem;right:2rem;background:transparent;border:1px solid #d6c89a;color:#d6c89a;padding:.5rem 1rem;cursor:pointer;font-family:monospace;font-size:.6rem;z-index:101}
  #closeModal:hover{background:#d6c89a;color:#0c0a08}
</style>
</head>
<body>

<div id="overture">
  <h1>Você está prestes a entrar em um museu<br>que não existe.</h1>
  <button id="enter">entrar</button>
</div>

<div id="stage"></div>

<div id="modal">
  <img id="modalImg" src="" alt="">
</div>
<button id="closeModal">fechar</button>

<script>
const overture = document.getElementById('overture');
const stage = document.getElementById('stage');
const enter = document.getElementById('enter');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const closeModal = document.getElementById('closeModal');

// Obras de domínio público do Wikimedia Commons
const works = [
  {
    title: 'A Leiteira',
    artist: 'Johannes Vermeer',
    year: '1660',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Johannes_Vermeer_-_The_Milkmaid_-_Google_Art_Project.jpg/640px-Johannes_Vermeer_-_The_Milkmaid_-_Google_Art_Project.jpg'
  },
  {
    title: 'Autorretrato',
    artist: 'Rembrandt van Rijn',
    year: '1659',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/Rembrandt_-_Self-portrait_-_Google_Art_Project.jpg/640px-Rembrandt_-_Self-portrait_-_Google_Art_Project.jpg'
  },
  {
    title: 'A Caça de Diana',
    artist: 'Peter Paul Rubens',
    year: '1616',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Peter_Paul_Rubens_-_Diana_and_her_Nymphs_Returning_from_the_Hunt.JPG/800px-Peter_Paul_Rubens_-_Diana_and_her_Nymphs_Returning_from_the_Hunt.JPG'
  },
  {
    title: 'Nascimento de Vênus',
    artist: 'Sandro Botticelli',
    year: '1484',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Sandro_Botticelli_-_La_Nascita_di_Venere.jpg/800px-Sandro_Botticelli_-_La_Nascita_di_Venere.jpg'
  },
  {
    title: 'A Noite Estrelada',
    artist: 'Vincent van Gogh',
    year: '1889',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/757px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg'
  },
  {
    title: 'O Grito',
    artist: 'Edvard Munch',
    year: '1893',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73_cm%2C_National_Gallery_of_Norway.jpg/640px-Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73_cm%2C_National_Gallery_of_Norway.jpg'
  }
];

function buildGallery(){
  const gallery = document.createElement('div');
  gallery.id = 'gallery';

  works.forEach(work => {
    const card = document.createElement('div');
    card.className = 'work';
    card.innerHTML = `
      <img src="${work.img}" alt="${work.title}" loading="lazy">
      <div class="work-meta">
        <div class="work-title">${work.title}</div>
        <div style="font-size:.5rem;opacity:.7">${work.artist} · ${work.year}</div>
      </div>
    `;
    card.addEventListener('click', ()=>{
      modalImg.src = work.img;
      modal.classList.add('show');
    });
    gallery.appendChild(card);
  });

  stage.appendChild(gallery);
}

enter.addEventListener('click', ()=>{
  overture.classList.add('gone');
  buildGallery();
});

closeModal.addEventListener('click', ()=>{
  modal.classList.remove('show');
});

modal.addEventListener('click', (e)=>{
  if(e.target === modal) modal.classList.remove('show');
});

document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') modal.classList.remove('show');
});
</script>
</body>
</html>
