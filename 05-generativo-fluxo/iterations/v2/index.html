<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo — Arte Generativa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    canvas { position: fixed; inset: 0; display: block; }

    #hud {
      position: fixed; bottom: 1.5rem; left: 1.5rem;
      color: rgba(0,0,0,0.35); font-size: 0.75rem; line-height: 1.8;
      pointer-events: none; z-index: 10;
      user-select: none;
      transition: opacity 0.5s ease, color 1s ease;
    }
    #hud:hover { opacity: 1 !important; }
    #hud .palette-name { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; }

    #tooltip {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      color: rgba(0,0,0,0.3); font-size: 0.7rem;
      pointer-events: none; z-index: 10;
      opacity: 1; transition: opacity 1.5s ease;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud" role="status" aria-live="polite">
    <div class="palette-name" id="palette-name">Bruma Matinal</div>
    <div id="age-display">0 minutos</div>
    <div id="hint-text" style="font-size:0.65rem;opacity:0.6;">espaço = pausa</div>
  </div>
  <div id="tooltip" aria-hidden="true">mova o mouse para interagir</div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // PERLIN NOISE — Ken Perlin reference implementation
    // ═══════════════════════════════════════════════════════════
    const Perlin = (() => {
      const P = new Uint8Array(512);
      const perm = [
        151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,
        140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,
        247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,
        57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,
        74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,
        60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,
        65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,
        200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,
        52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,
        207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,
        119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,
        129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,
        218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,
        81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,
        184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,
        222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180
      ];
      for (let i = 0; i < 256; i++) P[i] = P[i + 256] = perm[i];

      function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
      function lerp(a, b, t) { return a + t * (b - a); }
      function grad(hash, x, y, z) {
        const h = hash & 15, u = h < 8 ? x : y;
        const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
        return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
      }
      return {
        noise(x, y, z = 0) {
          const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255, zi = Math.floor(z) & 255;
          const xf = x - Math.floor(x), yf = y - Math.floor(y), zf = z - Math.floor(z);
          const u = fade(xf), v = fade(yf), w = fade(zf);
          const a = P[xi]+yi, aa = P[a]+zi, ab = P[a+1]+zi;
          const b = P[xi+1]+yi, ba = P[b]+zi, bb = P[b+1]+zi;
          return lerp(
            lerp(lerp(grad(P[aa],xf,yf,zf),grad(P[ba],xf-1,yf,zf),u),
                 lerp(grad(P[ab],xf,yf-1,zf),grad(P[bb],xf-1,yf-1,zf),u),v),
            lerp(lerp(grad(P[aa+1],xf,yf,zf-1),grad(P[ba+1],xf-1,yf,zf-1),u),
                 lerp(grad(P[ab+1],xf,yf-1,zf-1),grad(P[bb+1],xf-1,yf-1,zf-1),u),v),w);
        }
      };
    })();

    // ═══════════════════════════════════════════════════════════
    // SISTEMA DE PALETAS CURADAS
    // ═══════════════════════════════════════════════════════════
    const PALETTES = [
      {
        name: 'Bruma Matinal',
        bg: '#f0e8d5',
        colors: ['#1a3a4a','#2a5a6e','#3d7a8a','#5a9aaa','#a8c4cc']
      },
      {
        name: 'Crepúsculo',
        bg: '#1a0a1e',
        colors: ['#ff6b35','#f7c59f','#efefd0','#c879b9','#8c4a8c']
      },
      {
        name: 'Tinta Sumi-e',
        bg: '#e8e0d0',
        colors: ['#1a1a1a','#3d3d3d','#6b5c4a','#8c7b6a','#b8a89a']
      },
      {
        name: 'Coral Vivo',
        bg: '#0a1a2e',
        colors: ['#ff6b6b','#ee8585','#ffd166','#06d6a0','#118ab2']
      },
      {
        name: 'Pedra Lunar',
        bg: '#0a0e1a',
        colors: ['#e8e8f0','#b8bcc8','#8890a0','#545c70','#2c3444']
      },
      {
        name: 'Folhagem',
        bg: '#f5f0e8',
        colors: ['#2d5a27','#4a8c3f','#7ab648','#b8c84a','#d4b04a']
      }
    ];

    // ═══════════════════════════════════════════════════════════
    // INTERPOLAÇÃO DE COR (lerp RGB)
    // ═══════════════════════════════════════════════════════════
    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1,3),16),
        g: parseInt(hex.slice(3,5),16),
        b: parseInt(hex.slice(5,7),16)
      };
    }

    function lerpColor(c1, c2, t) {
      const a = hexToRgb(c1), b = hexToRgb(c2);
      return {
        r: Math.round(a.r + (b.r - a.r) * t),
        g: Math.round(a.g + (b.g - a.g) * t),
        b: Math.round(a.b + (b.b - a.b) * t)
      };
    }

    function rgbToStr(c) { return `rgb(${c.r},${c.g},${c.b})`; }
    function hexToRgba(hex, alpha) {
      const { r, g, b } = hexToRgb(hex);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // ═══════════════════════════════════════════════════════════
    // ESTADO DAS PALETAS
    // ═══════════════════════════════════════════════════════════
    let paletteIndex = 0;
    let nextPaletteIndex = 1;
    let paletteTransition = 1.0; // 1.0 = totalmente na paleta atual
    let paletteTimer = 0;
    const PALETTE_DURATION = 90 * 60; // 90s a 60fps

    function getCurrentPalette() {
      if (paletteTransition >= 1.0) return PALETTES[paletteIndex];

      // Interpolar entre paletas
      const A = PALETTES[paletteIndex];
      const B = PALETTES[nextPaletteIndex];
      const t = easeInOutQuart(paletteTransition);

      return {
        name: t < 0.5 ? A.name : B.name,
        bg: hexToRgba('#000000', 0), // handled separadamente
        _bgA: A.bg, _bgB: B.bg,
        colors: A.colors.map((c, i) => {
          const lc = lerpColor(c, B.colors[i], t);
          return rgbToStr(lc);
        }),
        _isTransitioning: true,
        _t: t
      };
    }

    function getBgColor(t) {
      const A = PALETTES[paletteIndex];
      const B = PALETTES[nextPaletteIndex];
      const ease = easeInOutQuart(t);
      const lc = lerpColor(A.bg, B.bg, ease);
      return rgbToStr(lc);
    }

    // easeInOutQuart
    function easeInOutQuart(t) {
      return t < 0.5 ? 8*t*t*t*t : 1 - Math.pow(-2*t+2, 4)/2;
    }

    // ═══════════════════════════════════════════════════════════
    // CLASSE PARTICLE
    // ═══════════════════════════════════════════════════════════
    class Particle {
      constructor() {
        this.reset(true);
        this.assignColor();
      }

      reset(initial = false) {
        if (initial) {
          this.x = Math.random() * W;
          this.y = Math.random() * H;
        } else {
          const edge = Math.floor(Math.random() * 4);
          if (edge === 0) { this.x = 0; this.y = Math.random() * H; }
          else if (edge === 1) { this.x = W; this.y = Math.random() * H; }
          else if (edge === 2) { this.x = Math.random() * W; this.y = 0; }
          else { this.x = Math.random() * W; this.y = H; }
        }
        this.vx = 0; this.vy = 0;
        this.history = [];
        this.lineWidth = 0.5 + Math.random() * 1.0;
        this.age = Math.floor(Math.random() * 300);
      }

      assignColor() {
        const roll = Math.random();
        if (roll < 0.70) this.colorIndex = 0;
        else if (roll < 0.90) this.colorIndex = 1 + Math.floor(Math.random() * 2);
        else this.colorIndex = 3 + Math.floor(Math.random() * 2);
      }

      update(t) {
        this.history.push({ x: this.x, y: this.y });
        if (this.history.length > 5) this.history.shift();

        const nx = this.x * 0.004;
        const ny = this.y * 0.004;
        const angle = Perlin.noise(nx, ny, t * 0.0001) * Math.PI * 2;

        // Magnitude do campo → espessura da linha
        const mag = Math.abs(Perlin.noise(nx + 0.5, ny + 0.5, t * 0.0001 + 100));
        this.lineWidth = 0.4 + mag * 1.6;

        const speed = 0.8 + mag * 1.2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;

        // ATRATOR DO MOUSE — força máxima 0.3 (campo tem força 1.0)
        if (mouseActive) {
          const dx = mouseX - this.x;
          const dy = mouseY - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 300 && dist > 0) {
            const attract = Math.max(0, 1 - dist / 300) * 0.3;
            this.vx += (dx / dist) * attract;
            this.vy += (dy / dist) * attract;
          }
        }

        this.x += this.vx;
        this.y += this.vy;
        this.age++;

        if (this.x < -5 || this.x > W+5 || this.y < -5 || this.y > H+5) {
          this.reset(false);
          this.assignColor();
        }
      }

      draw(ctx, palette) {
        if (this.history.length < 2) return;
        const color = palette.colors[this.colorIndex];
        ctx.beginPath();
        ctx.lineWidth = this.lineWidth;

        // Extrair RGB para alpha baixo
        let r, g, b;
        if (color.startsWith('rgb(')) {
          const m = color.match(/\d+/g);
          r = m[0]; g = m[1]; b = m[2];
          ctx.strokeStyle = `rgba(${r},${g},${b},0.07)`;
        } else {
          ctx.strokeStyle = hexToRgba(color, 0.07);
        }

        ctx.lineCap = 'round';
        const h = this.history;
        ctx.moveTo(h[0].x, h[0].y);
        for (let i = 1; i < h.length; i++) {
          const mx = (h[i-1].x + h[i].x) / 2;
          const my = (h[i-1].y + h[i].y) / 2;
          ctx.quadraticCurveTo(h[i-1].x, h[i-1].y, mx, my);
        }
        ctx.stroke();
      }
    }

    // ═══════════════════════════════════════════════════════════
    // SETUP
    // ═══════════════════════════════════════════════════════════
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let particles = [];
    const PARTICLE_COUNT = 2000;
    let t = 0;
    let paused = false;
    let mouseX = 0, mouseY = 0, mouseActive = false;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      const pal = getCurrentPalette();
      ctx.fillStyle = pal._isTransitioning ? getBgColor(paletteTransition) : pal.bg;
      ctx.fillRect(0, 0, W, H);
    }

    function init() {
      resize();
      particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());
    }

    // ═══════════════════════════════════════════════════════════
    // LOOP
    // ═══════════════════════════════════════════════════════════
    function loop() {
      if (!paused) {
        // Transição de paleta
        paletteTimer++;
        if (paletteTimer >= PALETTE_DURATION) {
          if (paletteTransition >= 1.0) {
            // Iniciar transição
            paletteTransition = 0;
            nextPaletteIndex = (paletteIndex + 1) % PALETTES.length;
          }
        }

        // Avançar transição (~3 segundos = 180 frames)
        if (paletteTransition < 1.0) {
          paletteTransition += 1 / 180;
          if (paletteTransition >= 1.0) {
            paletteTransition = 1.0;
            paletteIndex = nextPaletteIndex;
            paletteTimer = 0; // Reset timer
            hudPalette.textContent = PALETTES[paletteIndex].name;
          }
        }

        const pal = getCurrentPalette();
        const bgColor = pal._isTransitioning ? getBgColor(paletteTransition) : pal.bg;

        // Fade suave — alpha baixíssimo para efeito aquarela
        const bgRgb = hexToRgb(pal._isTransitioning ? PALETTES[paletteIndex].bg : pal.bg);
        ctx.fillStyle = `rgba(${bgRgb.r},${bgRgb.g},${bgRgb.b},0.018)`;
        ctx.fillRect(0, 0, W, H);

        particles.forEach(p => {
          p.update(t);
          p.draw(ctx, pal);
        });

        t++;
      }

      updateHUD();
      requestAnimationFrame(loop);
    }

    // ═══════════════════════════════════════════════════════════
    // HUD
    // ═══════════════════════════════════════════════════════════
    const hudAge = document.getElementById('age-display');
    const hudPalette = document.getElementById('palette-name');
    const hud = document.getElementById('hud');
    const startTime = Date.now();

    function updateHUD() {
      const minutes = Math.floor((Date.now() - startTime) / 60000);
      hudAge.textContent = minutes === 0 ? 'recém iniciada' : `${minutes} minuto${minutes > 1 ? 's' : ''}`;
      hud.style.opacity = '0.3';
    }

    // ═══════════════════════════════════════════════════════════
    // EVENTOS
    // ═══════════════════════════════════════════════════════════
    const tooltip = document.getElementById('tooltip');
    setTimeout(() => { tooltip.style.opacity = '0'; }, 5000);

    window.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        paused = !paused;
        tooltip.textContent = paused ? 'pausado — espaço para continuar' : 'espaço = pausa';
        tooltip.style.opacity = '0.6';
        setTimeout(() => { tooltip.style.opacity = '0'; }, 2000);
      }
    });

    window.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
      mouseActive = true;
    });

    window.addEventListener('mouseleave', () => { mouseActive = false; });

    window.addEventListener('resize', () => {
      resize();
      particles.forEach(p => { if (p.x > W || p.y > H) p.reset(true); });
    });

    init();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
