<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo — Arte Generativa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0e8d5;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    /* HUD minimalista */
    #hud {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      color: rgba(40, 30, 20, 0.4);
      font-size: 0.75rem;
      line-height: 1.8;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.4s ease;
      user-select: none;
    }

    #hud .palette-name {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Tooltip de descoberta */
    #tooltip {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      color: rgba(40, 30, 20, 0.35);
      font-size: 0.7rem;
      pointer-events: none;
      z-index: 10;
      opacity: 1;
      transition: opacity 1.5s ease;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud" role="status" aria-live="polite" aria-label="Informações da obra generativa">
    <div class="palette-name" id="palette-name">Bruma Matinal</div>
    <div id="age-display">0 minutos</div>
  </div>

  <div id="tooltip" aria-hidden="true">espaço = pausa</div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // PERLIN NOISE — Implementação baseada na referência de Ken Perlin
    // Versão 3D simplificada para uso como noise(x, y, t)
    // ═══════════════════════════════════════════════════════════
    const Perlin = (() => {
      // Permutation table (duplicada para evitar overflow)
      const P = new Uint8Array(512);
      const perm = [
        151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,
        140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,
        247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,
        57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,
        74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,
        60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,
        65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,
        200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,
        52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,
        207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,
        119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,
        129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,
        218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,
        81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,
        184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,
        222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180
      ];
      for (let i = 0; i < 256; i++) P[i] = P[i + 256] = perm[i];

      function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
      function lerp(a, b, t) { return a + t * (b - a); }
      function grad(hash, x, y, z) {
        const h = hash & 15;
        const u = h < 8 ? x : y;
        const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
        return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
      }

      return {
        noise(x, y, z = 0) {
          const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255, zi = Math.floor(z) & 255;
          const xf = x - Math.floor(x), yf = y - Math.floor(y), zf = z - Math.floor(z);
          const u = fade(xf), v = fade(yf), w = fade(zf);

          const a  = P[xi] + yi,     aa = P[a] + zi,  ab = P[a + 1] + zi;
          const b  = P[xi + 1] + yi, ba = P[b] + zi,  bb = P[b + 1] + zi;

          return lerp(
            lerp(lerp(grad(P[aa], xf, yf, zf),     grad(P[ba], xf-1, yf, zf),   u),
                 lerp(grad(P[ab], xf, yf-1, zf),   grad(P[bb], xf-1, yf-1, zf), u), v),
            lerp(lerp(grad(P[aa+1], xf, yf, zf-1), grad(P[ba+1], xf-1, yf, zf-1), u),
                 lerp(grad(P[ab+1], xf, yf-1, zf-1), grad(P[bb+1], xf-1, yf-1, zf-1), u), v),
            w
          );
        }
      };
    })();

    // ═══════════════════════════════════════════════════════════
    // PALETA INICIAL — Monocromática azul-petróleo sobre creme
    // ═══════════════════════════════════════════════════════════
    const PALETTE_BRUMA = {
      name: 'Bruma Matinal',
      bg: '#f0e8d5',
      colors: [
        '#1a3a4a', // azul-petróleo profundo
        '#2a5a6e', // médio
        '#3d7a8a', // claro
        '#5a9aaa', // quase céu
        '#a8c4cc', // névoa
      ]
    };

    // ═══════════════════════════════════════════════════════════
    // CLASSE PARTICLE
    // ═══════════════════════════════════════════════════════════
    class Particle {
      constructor(canvas, palette) {
        this.canvas = canvas;
        this.palette = palette;
        this.reset(true);
        this.assignColor();
      }

      reset(initial = false) {
        if (initial) {
          // Distribuição inicial por toda a tela
          this.x = Math.random() * this.canvas.width;
          this.y = Math.random() * this.canvas.height;
        } else {
          // Renascer na borda oposta
          const edge = Math.floor(Math.random() * 4);
          if (edge === 0) { this.x = 0; this.y = Math.random() * this.canvas.height; }
          else if (edge === 1) { this.x = this.canvas.width; this.y = Math.random() * this.canvas.height; }
          else if (edge === 2) { this.x = Math.random() * this.canvas.width; this.y = 0; }
          else { this.x = Math.random() * this.canvas.width; this.y = this.canvas.height; }
        }
        this.vx = 0;
        this.vy = 0;
        this.history = [];
        // Espessura individual: 0.5–1.5
        this.lineWidth = 0.5 + Math.random() * 1.0;
        // Vida da partícula (varia para stagger)
        this.age = Math.floor(Math.random() * 200);
      }

      assignColor() {
        // 70% cor principal, 20% secundária, 10% acento
        const roll = Math.random();
        if (roll < 0.70) this.colorIndex = 0;
        else if (roll < 0.90) this.colorIndex = Math.floor(Math.random() * 2) + 1;
        else this.colorIndex = 3 + Math.floor(Math.random() * 2);
      }

      update(t, fieldScale) {
        // Guardar histórico de posição para curvas suaves
        this.history.push({ x: this.x, y: this.y });
        if (this.history.length > 5) this.history.shift();

        // Ângulo do campo de fluxo via Perlin noise
        const nx = this.x * 0.004 * fieldScale;
        const ny = this.y * 0.004 * fieldScale;
        const angle = Perlin.noise(nx, ny, t * 0.0001) * Math.PI * 2;

        // Velocidade proporcional à magnitude estimada do campo
        const mag = Math.abs(Perlin.noise(nx + 0.5, ny + 0.5, t * 0.0001));
        const speed = 0.8 + mag * 1.2;

        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;

        this.x += this.vx;
        this.y += this.vy;
        this.age++;

        // Sair da tela → renascer na borda oposta
        if (this.x < -5 || this.x > this.canvas.width + 5 ||
            this.y < -5 || this.y > this.canvas.height + 5) {
          this.reset(false);
          this.assignColor();
        }
      }

      draw(ctx, palette) {
        if (this.history.length < 2) return;

        ctx.beginPath();
        ctx.lineWidth = this.lineWidth;
        ctx.strokeStyle = palette.colors[this.colorIndex] + '18'; // alpha ~0.1
        ctx.lineCap = 'round';

        const h = this.history;
        ctx.moveTo(h[0].x, h[0].y);
        for (let i = 1; i < h.length; i++) {
          // Curva suave entre pontos
          const mx = (h[i - 1].x + h[i].x) / 2;
          const my = (h[i - 1].y + h[i].y) / 2;
          ctx.quadraticCurveTo(h[i - 1].x, h[i - 1].y, mx, my);
        }
        ctx.stroke();
      }
    }

    // ═══════════════════════════════════════════════════════════
    // SETUP
    // ═══════════════════════════════════════════════════════════
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let particles = [];
    const PARTICLE_COUNT = 2000;
    let currentPalette = PALETTE_BRUMA;
    let t = 0;
    let paused = false;
    let rafId;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      // Preencher fundo ao redimensionar
      ctx.fillStyle = currentPalette.bg;
      ctx.fillRect(0, 0, W, H);
    }

    function init() {
      resize();
      // Fundo inicial
      ctx.fillStyle = currentPalette.bg;
      ctx.fillRect(0, 0, W, H);
      // Criar partículas
      particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle(canvas, currentPalette));
    }

    // ═══════════════════════════════════════════════════════════
    // LOOP PRINCIPAL
    // ═══════════════════════════════════════════════════════════
    function loop(timestamp) {
      if (!paused) {
        // Fade muito suave sobre o canvas (trail pictórico)
        ctx.fillStyle = hexToRgba(currentPalette.bg, 0.02);
        ctx.fillRect(0, 0, W, H);

        // Atualizar e desenhar todas as partículas
        particles.forEach(p => {
          p.update(t, 1.0);
          p.draw(ctx, currentPalette);
        });

        t++;
      }

      updateHUD();
      rafId = requestAnimationFrame(loop);
    }

    // ═══════════════════════════════════════════════════════════
    // HUD
    // ═══════════════════════════════════════════════════════════
    const hudAge = document.getElementById('age-display');
    const hudPalette = document.getElementById('palette-name');
    const startTime = Date.now();

    function updateHUD() {
      const minutes = Math.floor((Date.now() - startTime) / 60000);
      hudAge.textContent = minutes === 0 ? 'menos de 1 minuto' : `${minutes} minuto${minutes > 1 ? 's' : ''}`;
    }

    // ═══════════════════════════════════════════════════════════
    // TOOLTIP DESAPARECE APÓS 5s
    // ═══════════════════════════════════════════════════════════
    const tooltip = document.getElementById('tooltip');
    setTimeout(() => { tooltip.style.opacity = '0'; }, 5000);

    // ═══════════════════════════════════════════════════════════
    // PAUSA COM ESPAÇO
    // ═══════════════════════════════════════════════════════════
    window.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        paused = !paused;
        tooltip.textContent = paused ? 'pausado — espaço para continuar' : 'espaço = pausa';
        tooltip.style.opacity = '0.6';
        setTimeout(() => { tooltip.style.opacity = '0'; }, 2000);
      }
    });

    // ═══════════════════════════════════════════════════════════
    // UTILITÁRIOS
    // ═══════════════════════════════════════════════════════════
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    window.addEventListener('resize', () => {
      resize();
      // Reposicionar partículas que saíram dos limites
      particles.forEach(p => {
        if (p.x > W || p.y > H) p.reset(true);
      });
    });

    // ═══════════════════════════════════════════════════════════
    // INICIAR
    // ═══════════════════════════════════════════════════════════
    init();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
