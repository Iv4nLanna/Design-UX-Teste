<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo — Arte Generativa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    canvas { position: fixed; inset: 0; display: block; }

    #hud {
      position: fixed; bottom: 1.5rem; left: 1.5rem;
      color: rgba(0,0,0,0.3); font-size: 0.75rem; line-height: 1.9;
      pointer-events: none; z-index: 10; user-select: none;
      opacity: 0.3; transition: opacity 0.4s ease;
    }
    #hud:hover { opacity: 1; pointer-events: auto; }
    #hud .palette-name { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; }
    #hud .hint { font-size: 0.65rem; opacity: 0.7; }

    #toast {
      position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.9);
      font-size: 0.8rem; padding: 0.5rem 1.2rem; border-radius: 2px;
      pointer-events: none; z-index: 20;
      opacity: 0; transition: opacity 0.4s ease;
    }
    #toast.show { opacity: 1; }

    /* Storm indicator */
    #storm-indicator {
      position: fixed; top: 1.5rem; right: 1.5rem;
      color: rgba(255,120,0,0.7); font-size: 0.7rem;
      pointer-events: none; z-index: 10;
      opacity: 0; transition: opacity 0.5s ease;
      font-weight: 600; letter-spacing: 0.05em;
    }
    #storm-indicator.active { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud" role="status" aria-live="polite" aria-label="Status da obra generativa">
    <div class="palette-name" id="palette-name">Bruma Matinal</div>
    <div id="age-display">recém iniciada</div>
    <div class="hint">espaço = pausa · S = exportar PNG</div>
    <div class="hint">clique duplo = tempestade</div>
  </div>

  <div id="toast" aria-live="polite" aria-atomic="true"></div>
  <div id="storm-indicator" aria-hidden="true">⚡ TEMPESTADE</div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // PERLIN NOISE — Ken Perlin reference
    // ═══════════════════════════════════════════════════════════
    const Perlin = (() => {
      const P = new Uint8Array(512);
      const perm = [
        151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,
        140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,
        247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,
        57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,
        74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,
        60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,
        65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,
        200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,
        52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,
        207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,
        119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,
        129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,
        218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,
        81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,
        184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,
        222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180
      ];
      for (let i = 0; i < 256; i++) P[i] = P[i+256] = perm[i];
      function fade(t) { return t*t*t*(t*(t*6-15)+10); }
      function lerp(a,b,t) { return a+t*(b-a); }
      function grad(h,x,y,z) {
        h &= 15; const u=h<8?x:y, v=h<4?y:(h===12||h===14?x:z);
        return ((h&1)?-u:u)+((h&2)?-v:v);
      }
      return {
        noise(x,y,z=0) {
          const xi=Math.floor(x)&255,yi=Math.floor(y)&255,zi=Math.floor(z)&255;
          const xf=x-Math.floor(x),yf=y-Math.floor(y),zf=z-Math.floor(z);
          const u=fade(xf),v=fade(yf),w=fade(zf);
          const a=P[xi]+yi,aa=P[a]+zi,ab=P[a+1]+zi;
          const b=P[xi+1]+yi,ba=P[b]+zi,bb=P[b+1]+zi;
          return lerp(
            lerp(lerp(grad(P[aa],xf,yf,zf),grad(P[ba],xf-1,yf,zf),u),
                 lerp(grad(P[ab],xf,yf-1,zf),grad(P[bb],xf-1,yf-1,zf),u),v),
            lerp(lerp(grad(P[aa+1],xf,yf,zf-1),grad(P[ba+1],xf-1,yf,zf-1),u),
                 lerp(grad(P[ab+1],xf,yf-1,zf-1),grad(P[bb+1],xf-1,yf-1,zf-1),u),v),w);
        }
      };
    })();

    // ═══════════════════════════════════════════════════════════
    // PALETAS CURADAS
    // ═══════════════════════════════════════════════════════════
    const PALETTES = [
      { name:'Bruma Matinal',  bg:'#f0e8d5', colors:['#1a3a4a','#2a5a6e','#3d7a8a','#5a9aaa','#a8c4cc'] },
      { name:'Crepúsculo',     bg:'#1a0a1e', colors:['#ff6b35','#f7c59f','#efefd0','#c879b9','#8c4a8c'] },
      { name:'Tinta Sumi-e',   bg:'#e8e0d0', colors:['#1a1a1a','#3d3d3d','#6b5c4a','#8c7b6a','#b8a89a'] },
      { name:'Coral Vivo',     bg:'#0a1a2e', colors:['#ff6b6b','#ee8585','#ffd166','#06d6a0','#118ab2'] },
      { name:'Pedra Lunar',    bg:'#0a0e1a', colors:['#e8e8f0','#b8bcc8','#8890a0','#545c70','#2c3444'] },
      { name:'Folhagem',       bg:'#f5f0e8', colors:['#2d5a27','#4a8c3f','#7ab648','#b8c84a','#d4b04a'] }
    ];

    function hexToRgb(h) { return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}; }
    function lerpColor(c1,c2,t) {
      const a=hexToRgb(c1),b=hexToRgb(c2);
      return {r:Math.round(a.r+(b.r-a.r)*t),g:Math.round(a.g+(b.g-a.g)*t),b:Math.round(a.b+(b.b-a.b)*t)};
    }
    function rgbToStr(c) { return `rgb(${c.r},${c.g},${c.b})`; }
    function hexToRgba(h,a) { const {r,g,b}=hexToRgb(h); return `rgba(${r},${g},${b},${a})`; }
    function easeInOutQuart(t) { return t<0.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2; }

    // ═══════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let t = 0;
    let paused = false;
    let mouseX = 0, mouseY = 0, mouseActive = false;

    // Paleta
    let paletteIndex = 0;
    let nextPaletteIndex = 1;
    let paletteTransition = 1.0;
    let paletteTimer = 0;
    const PALETTE_DURATION_FRAMES = 90 * 60; // 90s @ 60fps

    // Respiração (zoom suave do noise)
    let breathScale = 1.0;
    let breathT = 0;

    // Tempestade
    let stormActive = false;
    let stormTimer = 0;
    const STORM_DURATION = 5 * 60; // 5s
    let nextStormIn = randomStormDelay();

    function randomStormDelay() {
      // ~2 minutos = 7200 frames, +/- 30s
      return 6000 + Math.floor(Math.random() * 3600);
    }

    // ═══════════════════════════════════════════════════════════
    // LOCALSTORAGE — persistência
    // ═══════════════════════════════════════════════════════════
    const LS_KEY = 'fluxo_state_v2';

    function saveState() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          age: Date.now() - startTime,
          paletteIndex,
          savedAt: Date.now()
        }));
      } catch(e) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch(e) { return null; }
    }

    // ═══════════════════════════════════════════════════════════
    // CLASSE PARTICLE
    // ═══════════════════════════════════════════════════════════
    class Particle {
      constructor() { this.reset(true); this.assignColor(); }

      reset(initial=false) {
        if (initial) {
          this.x = Math.random() * W;
          this.y = Math.random() * H;
        } else {
          const edge = Math.floor(Math.random() * 4);
          if (edge===0) { this.x=0; this.y=Math.random()*H; }
          else if (edge===1) { this.x=W; this.y=Math.random()*H; }
          else if (edge===2) { this.x=Math.random()*W; this.y=0; }
          else { this.x=Math.random()*W; this.y=H; }
        }
        this.vx=0; this.vy=0; this.history=[];
        this.lineWidth=0.5+Math.random()*1.0;
        this.age=Math.floor(Math.random()*300);
      }

      assignColor() {
        const roll=Math.random();
        if (roll<0.70) this.colorIndex=0;
        else if (roll<0.90) this.colorIndex=1+Math.floor(Math.random()*2);
        else this.colorIndex=3+Math.floor(Math.random()*2);
      }

      update() {
        this.history.push({x:this.x,y:this.y});
        if (this.history.length>5) this.history.shift();

        const nx = this.x * 0.004 * breathScale;
        const ny = this.y * 0.004 * breathScale;
        const angle = Perlin.noise(nx, ny, t*0.0001) * Math.PI * 2;

        const mag = Math.abs(Perlin.noise(nx+0.5, ny+0.5, t*0.0001+100));
        this.lineWidth = 0.4 + mag * 1.6;

        // Velocidade base
        let speed = 0.8 + mag * 1.2;

        // Tempestade: 10% das partículas aceleram muito
        if (stormActive && Math.random() < 0.1) speed *= 4;

        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;

        // Atrator do mouse (força 0.3)
        if (mouseActive) {
          const dx=mouseX-this.x, dy=mouseY-this.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if (dist<300&&dist>0) {
            const attract=Math.max(0,1-dist/300)*0.3;
            this.vx+=(dx/dist)*attract; this.vy+=(dy/dist)*attract;
          }
        }

        this.x+=this.vx; this.y+=this.vy; this.age++;

        if (this.x<-5||this.x>W+5||this.y<-5||this.y>H+5) {
          this.reset(false); this.assignColor();
        }
      }

      draw(palette) {
        if (this.history.length<2) return;
        const col = palette.colors[this.colorIndex];
        ctx.beginPath();
        ctx.lineWidth=this.lineWidth;

        // Alpha baixíssimo — efeito aquarela
        if (col.startsWith('rgb(')) {
          const m=col.match(/\d+/g);
          ctx.strokeStyle=`rgba(${m[0]},${m[1]},${m[2]},0.07)`;
        } else {
          ctx.strokeStyle=hexToRgba(col,0.07);
        }
        ctx.lineCap='round';

        const h=this.history;
        ctx.moveTo(h[0].x,h[0].y);
        for (let i=1;i<h.length;i++) {
          const mx=(h[i-1].x+h[i].x)/2, my=(h[i-1].y+h[i].y)/2;
          ctx.quadraticCurveTo(h[i-1].x,h[i-1].y,mx,my);
        }
        ctx.stroke();
      }
    }

    function getPalette() {
      if (paletteTransition>=1.0) return PALETTES[paletteIndex];
      const A=PALETTES[paletteIndex], B=PALETTES[nextPaletteIndex];
      const tEased=easeInOutQuart(paletteTransition);
      return {
        name: tEased<0.5?A.name:B.name,
        bg: null,
        _bgA:A.bg, _bgB:B.bg,
        colors: A.colors.map((c,i)=>rgbToStr(lerpColor(c,B.colors[i],tEased))),
        _isTransitioning:true, _t:tEased
      };
    }

    function getBgRgba(alpha) {
      const pal=getPalette();
      const bg = pal._isTransitioning
        ? rgbToStr(lerpColor(pal._bgA||PALETTES[paletteIndex].bg, pal._bgB||PALETTES[nextPaletteIndex].bg, pal._t))
        : pal.bg;
      const {r,g,b}=hexToRgb(bg);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // ═══════════════════════════════════════════════════════════
    // SETUP E INIT
    // ═══════════════════════════════════════════════════════════
    let particles = [];
    const PARTICLE_COUNT = 2000;
    let startTime = Date.now();

    // Carregar estado salvo
    const savedState = loadState();
    if (savedState) {
      paletteIndex = Math.min(savedState.paletteIndex, PALETTES.length - 1);
      startTime = Date.now() - (savedState.age || 0);
      showToast(`Esta peça tem ${Math.floor((savedState.age||0)/60000)} minuto(s) — bem-vindo de volta.`);
    }

    function resize() {
      W=canvas.width=window.innerWidth;
      H=canvas.height=window.innerHeight;
      ctx.fillStyle=getBgRgba(1);
      ctx.fillRect(0,0,W,H);
    }

    function init() {
      resize();
      particles=Array.from({length:PARTICLE_COUNT},()=>new Particle());
      document.getElementById('palette-name').textContent=PALETTES[paletteIndex].name;
    }

    // ═══════════════════════════════════════════════════════════
    // LOOP PRINCIPAL
    // ═══════════════════════════════════════════════════════════
    function loop() {
      if (!paused) {
        // RESPIRAÇÃO: zoom suave do campo noise ao longo de 30s
        breathT += 1 / (30 * 60);
        breathScale = 1.0 + Math.sin(breathT * Math.PI * 2) * 0.15;

        // TEMPESTADE
        if (stormActive) {
          stormTimer++;
          if (stormTimer >= STORM_DURATION) {
            stormActive=false;
            stormTimer=0;
            nextStormIn=randomStormDelay();
            document.getElementById('storm-indicator').classList.remove('active');
          }
        } else {
          nextStormIn--;
          if (nextStormIn<=0) triggerStorm();
        }

        // TRANSIÇÃO DE PALETA
        paletteTimer++;
        if (paletteTimer>=PALETTE_DURATION_FRAMES && paletteTransition>=1.0) {
          paletteTransition=0;
          nextPaletteIndex=(paletteIndex+1)%PALETTES.length;
        }
        if (paletteTransition<1.0) {
          paletteTransition+=1/180;
          if (paletteTransition>=1.0) {
            paletteTransition=1.0;
            paletteIndex=nextPaletteIndex;
            paletteTimer=0;
            document.getElementById('palette-name').textContent=PALETTES[paletteIndex].name;
          }
        }

        // FADE DO CANVAS
        ctx.fillStyle=getBgRgba(0.018);
        ctx.fillRect(0,0,W,H);

        // DESENHAR PARTÍCULAS
        const pal=getPalette();
        particles.forEach(p=>{ p.update(); p.draw(pal); });

        t++;

        // Salvar estado a cada 5min (18000 frames)
        if (t % 18000 === 0) saveState();
      }

      updateHUD();
      requestAnimationFrame(loop);
    }

    // ═══════════════════════════════════════════════════════════
    // TEMPESTADE
    // ═══════════════════════════════════════════════════════════
    function triggerStorm() {
      stormActive=true;
      stormTimer=0;
      document.getElementById('storm-indicator').classList.add('active');
      setTimeout(()=>document.getElementById('storm-indicator').classList.remove('active'), 5500);
    }

    // ═══════════════════════════════════════════════════════════
    // HUD
    // ═══════════════════════════════════════════════════════════
    const hudAge=document.getElementById('age-display');

    function updateHUD() {
      const age=Date.now()-startTime;
      const minutes=Math.floor(age/60000);
      hudAge.textContent=minutes===0?'recém iniciada':`${minutes} minuto${minutes!==1?'s':''}`;
    }

    // ═══════════════════════════════════════════════════════════
    // TOAST
    // ═══════════════════════════════════════════════════════════
    const toast=document.getElementById('toast');
    let toastTimer;
    function showToast(msg) {
      toast.textContent=msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>toast.classList.remove('show'),3500);
    }

    // ═══════════════════════════════════════════════════════════
    // EXPORT PNG (tecla S)
    // ═══════════════════════════════════════════════════════════
    function exportPNG() {
      // Canvas de exportação 2x
      const exportCanvas=document.createElement('canvas');
      exportCanvas.width=W*2; exportCanvas.height=H*2;
      const ectx=exportCanvas.getContext('2d');
      ectx.scale(2,2);
      ectx.drawImage(canvas,0,0);

      // Assinatura sutil
      const now=new Date();
      const ts=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      const palName=PALETTES[paletteIndex].name;
      ectx.save();
      ectx.globalAlpha=0.25;
      ectx.font='12px system-ui, sans-serif';
      ectx.fillStyle='#000000';
      ectx.textAlign='right';
      ectx.fillText(`generated · ${ts} · ${palName}`, W-16, H-12);
      ectx.restore();

      const link=document.createElement('a');
      link.download=`fluxo-${ts}-${palName.toLowerCase().replace(/ /g,'-')}.png`;
      link.href=exportCanvas.toDataURL('image/png');
      link.click();
      showToast('PNG exportado!');
    }

    // ═══════════════════════════════════════════════════════════
    // EVENTOS
    // ═══════════════════════════════════════════════════════════
    window.addEventListener('keydown', e => {
      if (e.code==='Space') { e.preventDefault(); paused=!paused; }
      if (e.code==='KeyS' && !e.ctrlKey && !e.metaKey) exportPNG();
    });

    window.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; mouseActive=true; });
    window.addEventListener('mouseleave', ()=>{ mouseActive=false; });

    // Clique duplo = tempestade manual
    window.addEventListener('dblclick', ()=>{
      if (!stormActive) triggerStorm();
    });

    window.addEventListener('resize', ()=>{
      resize();
      particles.forEach(p=>{ if (p.x>W||p.y>H) p.reset(true); });
    });

    // Salvar ao fechar
    window.addEventListener('beforeunload', saveState);

    init();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
