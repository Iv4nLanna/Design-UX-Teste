<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campo de Fluxo</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const PALETTE_OCEANO = ['#001220','#0077b6','#00b4d8','#90e0ef','#caf0f8'];
const SCALE = 0.003;
const MAX_PARTICLES = 800;
const MAX_AGE = 200;

let particles = [];
let t = 0;

class Particle {
  constructor() { this.reset(); }
  reset() {
    // spawn on random edge
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { this.x = random(width); this.y = 0; }
    else if (edge === 1) { this.x = width; this.y = random(height); }
    else if (edge === 2) { this.x = random(width); this.y = height; }
    else { this.x = 0; this.y = random(height); }
    this.px = this.x; this.py = this.y;
    this.age = 0;
    this.maxAge = random(150, MAX_AGE);
    this.col = color(random(PALETTE_OCEANO));
    this.w = random(0.3, 1.5);
  }
  update() {
    this.px = this.x; this.py = this.y;
    const angle = noise(this.x * SCALE, this.y * SCALE, t) * TWO_PI * 4;
    this.x += cos(angle) * 1.5;
    this.y += sin(angle) * 1.5;
    this.age++;
    if (this.age > this.maxAge || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
      this.reset();
    }
  }
  draw() {
    const alpha = map(this.age, 0, this.maxAge, 0, 200);
    stroke(red(this.col), green(this.col), blue(this.col), alpha);
    strokeWeight(this.w);
    line(this.px, this.py, this.x, this.y);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  noiseDetail(4, 0.5);
  for (let i = 0; i < MAX_PARTICLES; i++) {
    particles.push(new Particle());
    // stagger initial ages so canvas fills in immediately
    particles[i].age = floor(random(particles[i].maxAge));
  }
}

function draw() {
  // low-alpha background creates trail/fossil effect
  background(0, 0, 0, 8);
  t += 0.003;
  for (const p of particles) {
    p.update();
    p.draw();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
