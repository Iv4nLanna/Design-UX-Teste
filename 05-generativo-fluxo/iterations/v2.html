<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campo de Fluxo</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const PALETTES = {
  oceano:  ['#001220','#0077b6','#00b4d8','#90e0ef','#caf0f8'],
  fogo:    ['#03071e','#e85d04','#f48c06','#faa307','#ffba08'],
  floresta:['#081c15','#1b4332','#40916c','#74c69d','#d8f3dc'],
  aurora:  ['#10002b','#7b2d8b','#00f5d4','#fee440','#ffffff'],
  mono:    ['#000000','#1a1a1a','#4d4d4d','#b3b3b3','#ffffff']
};
const PALETTE_NAMES = Object.keys(PALETTES);
let currentPaletteIdx = 0;
let activePalette = PALETTES.oceano;

const SCALE = 0.003;
const MAX_PARTICLES = 800;
let particles = [];
let t = 0;
let paused = false;
let mx = 0, my = 0;
const ATTRACTOR_STRENGTH = 0.4;
const ATTRACTOR_RADIUS = 200;

class Particle {
  constructor() { this.reset(); }
  reset() {
    const edge = floor(random(4));
    if (edge === 0) { this.x = random(width); this.y = 0; }
    else if (edge === 1) { this.x = width; this.y = random(height); }
    else if (edge === 2) { this.x = random(width); this.y = height; }
    else { this.x = 0; this.y = random(height); }
    this.px = this.x; this.py = this.y;
    this.age = 0;
    this.maxAge = random(120, 250);
    this.baseCol = random(activePalette);
    this.w = random(0.3, 1.8);
    this.speed = random(1.0, 2.2);
  }
  update() {
    this.px = this.x; this.py = this.y;
    // flow field angle
    const angle = noise(this.x * SCALE, this.y * SCALE, t) * TWO_PI * 4;
    let vx = cos(angle) * this.speed;
    let vy = sin(angle) * this.speed;
    // mouse attractor
    const dx = mx - this.x;
    const dy = my - this.y;
    const dist = sqrt(dx*dx + dy*dy);
    if (dist < ATTRACTOR_RADIUS && dist > 5) {
      const force = ATTRACTOR_STRENGTH * (1 - dist / ATTRACTOR_RADIUS);
      vx += (dx / dist) * force * 3;
      vy += (dy / dist) * force * 3;
    }
    this.x += vx; this.y += vy;
    this.age++;
    if (this.age > this.maxAge || this.x < -5 || this.x > width+5 || this.y < -5 || this.y > height+5) {
      this.reset();
    }
  }
  draw() {
    const alpha = map(this.age, 0, this.maxAge, 0, 180);
    const c = color(this.baseCol);
    stroke(red(c), green(c), blue(c), alpha);
    strokeWeight(this.w);
    line(this.px, this.py, this.x, this.y);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  noiseDetail(4, 0.5);
  for (let i = 0; i < MAX_PARTICLES; i++) {
    particles.push(new Particle());
    particles[i].age = floor(random(particles[i].maxAge));
  }
}

function draw() {
  if (paused) return;
  background(0, 0, 0, 8);
  t += 0.003;
  mx = mouseX; my = mouseY;
  for (const p of particles) { p.update(); p.draw(); }
}

function mousePressed() {
  // explosion: spawn 200 particles at click point
  for (let i = 0; i < 200; i++) {
    const p = new Particle();
    p.x = mouseX + random(-10, 10);
    p.y = mouseY + random(-10, 10);
    p.px = p.x; p.py = p.y;
    p.age = 0;
    p.maxAge = random(60, 150);
    p.speed = random(2, 5);
    particles.push(p);
  }
  // keep total under control
  while (particles.length > MAX_PARTICLES + 200) particles.shift();
}

function keyPressed() {
  if (key === 'c' || key === 'C') {
    currentPaletteIdx = (currentPaletteIdx + 1) % PALETTE_NAMES.length;
    activePalette = PALETTES[PALETTE_NAMES[currentPaletteIdx]];
    // update existing particles
    for (const p of particles) p.baseCol = random(activePalette);
  }
  if (key === 'r' || key === 'R') {
    particles = [];
    noiseSeed(floor(random(99999)));
    t = 0;
    background(0);
    for (let i = 0; i < MAX_PARTICLES; i++) {
      particles.push(new Particle());
      particles[i].age = floor(random(particles[i].maxAge));
    }
  }
  if (key === ' ') { paused = !paused; return false; }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
