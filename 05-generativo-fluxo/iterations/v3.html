<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFLUÊNCIA — v3</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;background:#0a0a12;color:#e8e2d4;font-family:'Cormorant Garamond',Georgia,serif;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  #overture{position:fixed;inset:0;z-index:50;background:#f6f1e6;color:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.6s;padding:2rem}
  #overture.gone{opacity:0;pointer-events:none}
  #count{font-size:5rem;font-weight:300;line-height:1}
  #enter{margin-top:3rem;padding:.8rem 1.6rem;border:1px solid #6a6253;background:transparent;cursor:pointer;font-family:monospace;font-size:.7rem;letter-spacing:.5em;text-transform:uppercase}
  #enter:hover{background:#1a1a1a;color:#f6f1e6}
  #hud{position:fixed;top:1.6rem;left:1.6rem;z-index:10;color:#e8e2d4;font-family:monospace;font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;opacity:.7}
  #toast{position:fixed;bottom:5%;left:50%;transform:translateX(-50%);z-index:20;background:rgba(0,0,0,.6);padding:.8rem 1.6rem;border:1px solid rgba(255,255,255,.2);color:#f6f1e6;font-style:italic;opacity:0;transition:opacity .8s}
  #toast.in{opacity:1}
  .btn{position:fixed;z-index:15;padding:.5rem .9rem;background:rgba(0,0,0,.5);border:1px solid #6a6253;color:#d6c89a;cursor:pointer;font-family:monospace;font-size:.55rem;letter-spacing:.35em;text-transform:uppercase}
  .btn:hover{border-color:#e8e2d4}
  #btnSouvenir{right:1.6rem;top:1.6rem}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="overture">
  <div id="count">0</div>
  <div style="font-size:.85rem;letter-spacing:.45em;text-transform:uppercase;color:#6a6253;margin-top:1.4rem">almas pintaram antes de você</div>
  <button id="enter" style="margin-top:3rem">Entrar</button>
</div>

<div id="hud">Confluência · pinceladas globais</div>
<div id="toast">sua pincelada foi adicionada</div>
<button class="btn" id="btnSouvenir">Souvenir</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overture = document.getElementById('overture');
const enter = document.getElementById('enter');
const toast = document.getElementById('toast');
const countEl = document.getElementById('count');

let painting = null;
let isDrawing = false;
let lastX = 0, lastY = 0;
let soulCount = 24912; // TEST: mudou de 24.911
let myStrokes = [];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if(!painting) initPainting();
  draw();
}

function initPainting(){
  painting = ctx.createImageData(canvas.width, canvas.height);
  const data = painting.data;
  const palette = [
    [30, 20, 15],    // dark brown
    [90, 70, 50],    // mid brown
    [180, 120, 80],  // light brown
    [220, 180, 140]  // tan
  ];

  for(let i=0; i<data.length; i+=4){
    const c = palette[Math.floor(Math.random()*palette.length)];
    data[i] = c[0];
    data[i+1] = c[1];
    data[i+2] = c[2];
    data[i+3] = Math.random() > 0.3 ? 255 : 200;
  }
}

function draw(){
  if(!painting) return;
  ctx.putImageData(painting, 0, 0);
}

function paintStroke(x0, y0, x1, y1, color){
  const dist = Math.hypot(x1-x0, y1-y0);
  const steps = Math.ceil(dist * 2);
  for(let i=0; i<=steps; i++){
    const t = steps > 0 ? i/steps : 0;
    const x = Math.round(x0 + (x1-x0)*t);
    const y = Math.round(y0 + (y1-y0)*t);
    const r = 8;

    for(let dy=-r; dy<=r; dy++){
      for(let dx=-r; dx<=r; dx++){
        if(dx*dx + dy*dy > r*r) continue;
        const px = x + dx, py = y + dy;
        if(px<0 || px>=canvas.width || py<0 || py>=canvas.height) continue;
        const idx = (py*canvas.width + px)*4;
        painting.data[idx] = color[0];
        painting.data[idx+1] = color[1];
        painting.data[idx+2] = color[2];
        painting.data[idx+3] = 255;
      }
    }
  }
  draw();
}

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('in');
  setTimeout(()=>toast.classList.remove('in'), 2000);
}

function downloadSouvenir(){
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = 'confluencia-' + Date.now() + '.png';
  link.click();
  showToast('souvenir baixado');
}

// Setup
countEl.textContent = soulCount;

canvas.addEventListener('mousedown', (e)=>{
  if(overture.classList.contains('gone')){
    isDrawing = true;
    lastX = e.clientX;
    lastY = e.clientY;
  }
});

canvas.addEventListener('mousemove', (e)=>{
  if(isDrawing){
    const color = [[255,100,150], [100,200,255], [200,150,100]][Math.floor(Math.random()*3)];
    paintStroke(lastX, lastY, e.clientX, e.clientY, color);
    lastX = e.clientX;
    lastY = e.clientY;
    myStrokes.push([lastX, lastY, color]);
  }
});

canvas.addEventListener('mouseup', ()=>{
  if(isDrawing && myStrokes.length){
    showToast('sua pincelada foi adicionada. ela ficará.');
    isDrawing = false;
  }
});

canvas.addEventListener('touchstart', (e)=>{
  if(overture.classList.contains('gone')){
    isDrawing = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
});

canvas.addEventListener('touchmove', (e)=>{
  if(isDrawing){
    const color = [[255,100,150], [100,200,255], [200,150,100]][Math.floor(Math.random()*3)];
    paintStroke(lastX, lastY, e.touches[0].clientX, e.touches[0].clientY, color);
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
});

canvas.addEventListener('touchend', ()=>{
  if(isDrawing && myStrokes.length){
    showToast('sua pincelada foi adicionada');
  }
  isDrawing = false;
});

enter.addEventListener('click', ()=>{
  overture.classList.add('gone');
  resizeCanvas();
});

document.getElementById('btnSouvenir').addEventListener('click', downloadSouvenir);

window.addEventListener('resize', resizeCanvas);

resizeCanvas();
</script>
</body>
</html>
