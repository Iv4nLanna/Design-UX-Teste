<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON PARALLAX</title>
<style>
:root {
  --neon-pink: #ff6ad5;
  --neon-cyan: #00f5ff;
  --neon-orange: #ff9a3c;
  --deep-purple: #0d0015;
  --mid-purple: #4a0080;
  --neon-yellow: #f5ff00;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--deep-purple); color: white; font-family: Arial, sans-serif; overflow-x: hidden; }

/* SKY */
.sky {
  position: relative;
  height: 100vh;
  background: linear-gradient(to bottom,
    #0d0015 0%, #1a0030 25%, #4a0080 50%,
    #c774e8 70%, #ff6ad5 82%, #ff9a3c 93%, #ff6a00 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}

/* STARS via box-shadow — 1px element, 80 points */
.stars {
  position: absolute; top: 0; left: 0;
  width: 1px; height: 1px; background: #fff;
  box-shadow:
    120px 45px #fff, 230px 89px rgba(255,255,255,.7), 567px 23px #fff,
    45px 120px rgba(255,255,255,.5), 789px 67px #fff, 345px 145px rgba(255,255,255,.8),
    678px 34px #fff, 123px 200px rgba(255,255,255,.6), 890px 78px #fff,
    456px 167px rgba(255,255,255,.9), 234px 56px #fff, 678px 190px rgba(255,255,255,.4),
    890px 112px #fff, 12px 230px rgba(255,255,255,.7), 567px 145px #fff,
    345px 78px rgba(255,255,255,.5), 789px 200px #fff, 123px 34px rgba(255,255,255,.8),
    456px 89px #fff, 234px 178px rgba(255,255,255,.6), 100px 300px #fff,
    400px 250px rgba(255,255,255,.7), 700px 180px #fff, 50px 350px rgba(255,255,255,.5),
    600px 320px #fff, 800px 90px rgba(255,255,255,.8), 300px 400px #fff,
    150px 420px rgba(255,255,255,.6), 550px 380px #fff, 950px 140px rgba(255,255,255,.9),
    80px 460px #fff, 420px 440px rgba(255,255,255,.4), 720px 410px #fff,
    200px 480px rgba(255,255,255,.7), 650px 460px #fff, 350px 490px rgba(255,255,255,.5),
    480px 30px #fff, 850px 380px rgba(255,255,255,.8), 130px 510px #fff,
    750px 500px rgba(255,255,255,.6), 60px 540px rgba(255,255,255,.4),
    390px 520px #fff, 680px 545px rgba(255,255,255,.7), 260px 555px #fff,
    820px 560px rgba(255,255,255,.5), 170px 570px #fff, 530px 575px rgba(255,255,255,.8),
    970px 565px #fff, 40px 580px rgba(255,255,255,.6), 460px 585px #fff,
    760px 590px rgba(255,255,255,.4), 310px 595px #fff, 900px 530px #fff,
    65px 155px rgba(255,255,255,.6), 445px 210px #fff, 815px 335px rgba(255,255,255,.5),
    285px 295px rgba(255,255,255,.8), 635px 265px #fff, 175px 375px rgba(255,255,255,.4),
    505px 330px rgba(255,255,255,.7), 875px 415px #fff, 335px 455px rgba(255,255,255,.6),
    715px 485px rgba(255,255,255,.5), 195px 498px #fff, 575px 512px rgba(255,255,255,.9),
    945px 525px rgba(255,255,255,.3), 105px 535px #fff, 485px 548px rgba(255,255,255,.7),
    855px 555px rgba(255,255,255,.5), 225px 562px #fff, 605px 568px rgba(255,255,255,.4),
    975px 575px rgba(255,255,255,.8), 365px 578px #fff, 745px 582px rgba(255,255,255,.6),
    135px 587px rgba(255,255,255,.3), 515px 591px #fff, 885px 594px rgba(255,255,255,.7),
    255px 15px rgba(255,255,255,.5), 625px 48px #fff, 995px 102px rgba(255,255,255,.6);
}

/* SUN — semicircle + stripes */
.sun {
  position: absolute;
  bottom: 35%; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 100px;
  background: linear-gradient(to bottom, #ffe066, #ff9a3c);
  border-radius: 100px 100px 0 0;
  box-shadow: 0 0 30px #ff9a3c, 0 0 60px rgba(255,154,60,.6), 0 0 100px rgba(255,106,0,.3);
  overflow: hidden;
}
.sun::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 10px,
    var(--deep-purple) 10px, var(--deep-purple) 14px
  );
}

/* GRID 3D perspective */
.grid-wrap {
  position: absolute;
  bottom: 0; left: -10%; right: -10%;
  height: 45%;
  perspective: 400px;
  perspective-origin: 50% 0%;
  overflow: hidden;
  pointer-events: none;
}
.grid {
  position: absolute; top: 0; left: 0; right: 0;
  height: 200%;
  background:
    repeating-linear-gradient(to right, rgba(255,106,213,.5) 0, rgba(255,106,213,.5) 1px, transparent 1px, transparent 60px),
    repeating-linear-gradient(to bottom, rgba(255,106,213,.5) 0, rgba(255,106,213,.5) 1px, transparent 1px, transparent 60px);
  transform: rotateX(65deg);
  transform-origin: top center;
  animation: gridScroll 3s linear infinite;
}
@keyframes gridScroll {
  from { background-position: 0 0; }
  to { background-position: 0 60px; }
}

/* TITLE */
.hero {
  position: relative; z-index: 10;
  text-align: center; margin-top: -40px;
}
.hero h1 {
  font-size: clamp(3rem, 10vw, 8rem);
  font-weight: 900; letter-spacing: .08em;
  text-transform: uppercase;
  color: #fff;
  text-shadow:
    0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan),
    0 0 40px var(--neon-cyan), 0 0 80px rgba(0,245,255,.4);
}
.hero h2 {
  font-size: clamp(.9rem, 2.5vw, 1.6rem);
  letter-spacing: .5em;
  color: var(--neon-pink);
  text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
  margin-top: .5rem;
}

/* SCANLINES overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom, transparent 0, transparent 3px,
    rgba(0,0,0,.12) 3px, rgba(0,0,0,.12) 4px
  );
  pointer-events: none; z-index: 1000;
}

/* BOTTOM INFO */
.info {
  background: var(--deep-purple);
  border-top: 1px solid var(--neon-pink);
  padding: 3rem 2rem; text-align: center;
}
.info p {
  color: var(--neon-cyan); letter-spacing: .4em; font-size: .85rem;
}

/* FLOATING SHAPES */
.shape {
  position: absolute;
  pointer-events: none;
  opacity: .7;
  animation: floatShape 6s ease-in-out infinite;
}
.shape-pyramid {
  width: 0; height: 0;
  border-left: 40px solid transparent;
  border-right: 40px solid transparent;
  border-bottom: 70px solid var(--neon-pink);
  filter: drop-shadow(0 0 8px var(--neon-pink));
  top: 20%; left: 15%;
  animation-delay: 0s;
}
.shape-diamond {
  width: 50px; height: 50px;
  background: var(--neon-cyan);
  transform: rotate(45deg);
  filter: drop-shadow(0 0 8px var(--neon-cyan));
  top: 30%; right: 18%;
  animation-delay: -2s;
}
.shape-triangle {
  width: 0; height: 0;
  border-left: 30px solid transparent;
  border-right: 30px solid transparent;
  border-bottom: 52px solid var(--neon-yellow);
  filter: drop-shadow(0 0 8px var(--neon-yellow));
  top: 15%; right: 30%;
  animation-delay: -4s;
}
@keyframes floatShape {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-18px) rotate(5deg); }
  66% { transform: translateY(10px) rotate(-3deg); }
}

/* CHROMATIC ABERRATION title */
.chroma-title { position: relative; display: inline-block; }
.chroma-title span { display: block; position: absolute; top: 0; left: 0;
  font-size: clamp(3rem, 10vw, 8rem); font-weight: 900;
  letter-spacing: .08em; text-transform: uppercase; line-height: 1; }
.chroma-w {
  position: relative !important;
  color: #fff;
  text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px var(--neon-cyan), 0 0 60px rgba(0,245,255,.4);
}
.chroma-r { color: rgba(255,106,213,.7); animation: chromaR 8s steps(1) infinite; }
.chroma-c { color: rgba(0,245,255,.7); animation: chromaC 8s steps(1) infinite; }
@keyframes chromaR {
  0%,89%  { transform: translate(0,0); opacity: 0; }
  90%,91% { transform: translate(-3px,-1px); opacity: 1; }
  92%,93% { transform: translate(2px,1px); opacity: 1; }
  94%,100%{ transform: translate(0,0); opacity: 0; }
}
@keyframes chromaC {
  0%,89%  { transform: translate(0,0); opacity: 0; }
  90%,91% { transform: translate(3px,1px); opacity: 1; }
  92%,93% { transform: translate(-2px,-1px); opacity: 1; }
  94%,100%{ transform: translate(0,0); opacity: 0; }
}

/* GLITCH on hover */
.chroma-title:hover .chroma-r { animation: chromaRHover .4s steps(1) infinite; }
.chroma-title:hover .chroma-c { animation: chromaCHover .4s steps(1) infinite; }
@keyframes chromaRHover {
  0%  { transform: translate(-5px,-2px); opacity: 1; }
  25% { transform: translate(4px,2px); opacity: .8; }
  50% { transform: translate(-3px,1px); opacity: 1; }
  75% { transform: translate(5px,-1px); opacity: .7; }
  100%{ transform: translate(-4px,2px); opacity: 1; }
}
@keyframes chromaCHover {
  0%  { transform: translate(5px,2px); opacity: 1; }
  25% { transform: translate(-4px,-2px); opacity: .8; }
  50% { transform: translate(3px,-1px); opacity: 1; }
  75% { transform: translate(-5px,1px); opacity: .7; }
  100%{ transform: translate(4px,-2px); opacity: 1; }
}

/* Second subtitle line */
.hero-sub {
  color: var(--neon-pink); font-size: clamp(.75rem, 2vw, 1.2rem);
  letter-spacing: .6em; margin-top: .8rem;
  text-shadow: 0 0 8px var(--neon-pink);
}
.hero-tagline {
  color: rgba(255,255,255,.4); font-size: .75rem; letter-spacing: .3em;
  margin-top: .5rem;
}
</style>
</head>
<body>
  <section class="sky" id="sky">
    <div class="stars"></div>
    <div class="sun"></div>
    <div class="grid-wrap"><div class="grid" id="grid"></div></div>
    <div class="hero">
      <h1 id="title" class="chroma-title">
        <span class="chroma-r" aria-hidden="true">NEON PARALLAX</span>
        <span class="chroma-w">NEON PARALLAX</span>
        <span class="chroma-c" aria-hidden="true">NEON PARALLAX</span>
      </h1>
      <h2>SYNTHWAVE · 1987</h2>
    </div>
    <div class="shape shape-pyramid"></div>
    <div class="shape shape-diamond"></div>
    <div class="shape shape-triangle"></div>
  </section>
  <section class="info">
    <p>SCROLL ↓ · MOVE MOUSE · CLICK</p>
  </section>

  <section class="info" style="border-top: none; padding-top:0;">
    <p class="hero-tagline" style="color:rgba(255,245,0,.5); letter-spacing:.3em;">
      CLICK ANYWHERE FOR AUDIO · MOUSE FOR PARALLAX
    </p>
  </section>

<script>
// Web Audio setup
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const PENTATONIC = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];

function playBeep() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)];
  gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

// Parallax on mouse move
const sky = document.getElementById('sky');
const grid = document.getElementById('grid');
const hero = document.querySelector('.hero');
const shapes = document.querySelectorAll('.shape');

document.addEventListener('mousemove', e => {
  const cx = (e.clientX / window.innerWidth - 0.5);
  const cy = (e.clientY / window.innerHeight - 0.5);
  // grid moves opposite, slow
  grid.style.transform = `rotateX(65deg) translateX(${cx * -20}px)`;
  // hero title moves with mouse, medium
  hero.style.transform = `translate(${cx * 12}px, ${cy * 8}px)`;
  // shapes move fastest
  shapes.forEach((s, i) => {
    const mult = (i + 1) * 8;
    const rotBase = i === 1 ? 45 : 0;
    s.style.transform = `translate(${cx * mult}px, ${cy * mult * 0.5}px) rotate(${rotBase}deg)`;
  });
});

// Click to play synth note
document.addEventListener('click', playBeep);

// Scroll: speed up grid
let scrollY = 0;
document.addEventListener('scroll', () => {
  scrollY = window.scrollY;
  const speed = 3 + scrollY * 0.01;
  grid.style.animationDuration = `${Math.max(0.5, 3 - scrollY * 0.005)}s`;
});
</script>

</body>
</html>
